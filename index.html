<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Rosie Sławińska — Model · Runner · Traveller</title>
    <meta
      name="description"
      content="The personal portfolio of Rosie Sławińska — Warsaw-based model represented by Model Plus Warsaw and Trend Models Management. Modeling, travel, running, culture and a life built around constant improvement."
    />
    <meta property="og:title" content="Rosie Sławińska" />
    <meta
      property="og:description"
      content="Warsaw-based model, runner and traveller. A life built around constant improvement."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/portrait-overlook.jpg" />
    <meta name="theme-color" content="#F7F3EC" />
  </head>
  <body>
    <!-- Netlify Forms detection: hidden static form mirrors the React ContactForm -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
